<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AK T-Shirts</title>

  <style>
    body{
      margin:0;
      padding:0;
      background:black;
      color:white;
      font-family:Arial;
    }

    header{
      padding:20px;
      text-align:center;
      background:#111;
    }

    h1{
      color:gold;
      font-size:40px;
    }

    .container{
      display:flex;
      justify-content:center;
      padding:40px;
    }

    .card{
      background:#111;
      border-radius:20px;
      overflow:hidden;
      width:300px;
      box-shadow:0 0 20px rgba(255,215,0,0.3);
    }

    .card img{
      width:100%;
    }

    .card-content{
      padding:20px;
      text-align:center;
    }

    .price{
      color:gold;
      font-size:24px;
      margin:10px 0;
    }

    button{
      background:gold;
      color:black;
      border:none;
      padding:12px 25px;
      border-radius:10px;
      font-size:18px;
      cursor:pointer;
      font-weight:bold;
    }

    footer{
      text-align:center;
      padding:20px;
      background:#111;
      margin-top:50px;
    }
  </style>
</head>

<body>

<header>
  <h1>AK T-Shirts</h1>
  <p>Premium T-Shirt Shopping Website</p>
</header>

<div class="container">

  <div class="card">
    
    <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=1200&auto=format&fit=crop">

    <div class="card-content">
      <h2>Black T-Shirt</h2>

      <div class="price">₹499</div>

      <button>Buy Now</button>
    </div>

  </div>

</div>

<footer>
  © 2026 AK T-Shirts
</footer>

</body>
</html>
